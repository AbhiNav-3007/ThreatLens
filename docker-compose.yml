version: '3.8'

services:
  db:
    image: mysql:latest
    container_name: threatlens_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: threatlens
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    container_name: threatlens_web
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpassword
      - MYSQL_DATABASE=threatlens
      - MYSQL_PORT=3306
    env_file:
      - .env
    volumes:
      - ./evidence_vault:/app/evidence_vault
      - ./uploads:/app/uploads

volumes:
  mysql_data:
